spring.application.name=HMS
server.port=8081
spring.datasource.url=jdbc:mysql://localhost:3306/hospital_management?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true

spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:1234}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JWT Configuration
jwt.secret=HospitalManagementSystemSecretKey2026ForJWTTokenGeneration
jwt.expiration=86400000

#AI FastAPI
ai.fastapi.url=http://localhost:8000
# Java 调用 AI 网关：超时 + 重试（失败后最多 3 次重试，总耗时上限内返回「当前 AI 服务暂不可用」）
ai.gateway.connect-timeout-ms=5000
ai.gateway.read-timeout-ms=7000
ai.gateway.max-retries=3
ai.gateway.total-timeout-ms=30000
ai.gateway.retry-backoff-ms=400

# Redis（分片上传 bitmap）
spring.data.redis.host=${REDIS_HOST:127.0.0.1}
spring.data.redis.port=${REDIS_PORT:6379}

# Kafka（知识库合并后异步解析入库）
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP:localhost:9092}
spring.kafka.consumer.group-id=hms-knowledge-ingest
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.listener.missing-topics-fatal=false

# MinIO
minio.endpoint=${MINIO_ENDPOINT:http://127.0.0.1:9000}
minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
minio.secret-key=${MINIO_SECRET_KEY:minioadmin}
minio.bucket=${MINIO_BUCKET:knowledge}

# 分片上传限制
knowledge.upload.max-chunks=10000
spring.servlet.multipart.max-file-size=32MB
spring.servlet.multipart.max-request-size=40MB

# 审计日志定时清理（默认每3天执行一次，保留最近3天）
audit.log.cleanup.fixed-delay-ms=259200000
audit.log.cleanup.initial-delay-ms=60000
audit.log.cleanup.retain-days=3
